#Puerto donde correrï¿½ el backend
server.port=${PORT:8080}

#Tu clave secreta de prueba de Stripe (Empieza por sk_test_...)
stripe.api.key=${STRIPE_API_KEY}

#URL de tu Realtime Database
firebase.database.url=${FIREBASE_DB_URL}

#Secreto del Webhook de Stripe (lo obtendremos con Stripe CLI)
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true